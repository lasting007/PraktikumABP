<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animasi jQuery</title>

    <!--
    NAUFAL ZAKI
    2311102120
    -->
  </head>
  <body>
    <h1>Praktikum jQuery - Animasi</h1>

    <p>Klik tombol untuk menjalankan animasi</p>
    <button id="animasi">Start Animation</button>

    <p>
      Secara default, elemen HTML memiliki posisi statis. Untuk menggerakkan
      elemen, gunakan properti CSS seperti relative, absolute, atau fixed.
    </p>

    <div
      id="kotak"
      style="
        background: #98bf21;
        height: 100px;
        width: 100px;
        position: absolute;
      "
    ></div>

    <script
      src="https://code.jquery.com/jquery-4.0.0.js"
      integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
      crossorigin="anonymous"
    ></script>

    <script>
      $(document).ready(function () {
        $("#animasi").click(function () {
          $("#kotak").animate({
            height: "toggle",
          });
        });
      });
    </script>
  </body>
</html>
